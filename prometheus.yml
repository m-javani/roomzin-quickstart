global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: 'roomzin-cluster'
    metrics_path: '/metrics'
    scheme: 'http'
    static_configs:
      - targets:
          - 'roomzin-0:8080'
          - 'roomzin-1:8080'
          - 'roomzin-2:8080'
        labels:
          cluster: 'roomzin'
          shard: 'shard1'
          zone: 'zone1'
    # Note: bearer_token_file is deprecated in v3.x
    authorization:
      credentials_file: /etc/prometheus/token.txt